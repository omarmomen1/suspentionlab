# Zero-Trust Network Policy for Data Plane
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: isolate-data-plane
  namespace: suspensionlab-data
spec:
  podSelector: {} # Select all pods in this namespace
  policyTypes:
  - Ingress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: suspensionlab-prod
    ports:
    - protocol: TCP
      port: 5432 # Postgres
    - protocol: TCP
      port: 6379 # Redis
