name: Deploy SuspensionLab PRO

on:
  push:
    branches:
      - master

# Required GitHub Secrets:
# - AWS_ACCESS_KEY_ID: IAM user access key with ECR/EKS permissions
# - AWS_SECRET_ACCESS_KEY: IAM user secret key
# - AWS_ACCOUNT_ID: The 12-digit AWS account ID
# - KUBE_CONFIG: Base64-encoded Kubernetes configuration file for the EKS cluster

env:
  AWS_REGION: us-east-1

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Syntax Check
        run: |
          find src -type f -name "*.py" -exec python -m py_compile {} +

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set Image Tag
        run: echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_ENV

      - name: Build, tag, and push backend image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: suspensionlab
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:backend-${{ github.sha }} -f Dockerfile.backend .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:backend-${{ github.sha }}

      - name: Build, tag, and push frontend image
        env:
          ECR_REGISTRY: ${{ secrets.AWS_ACCOUNT_ID }}.dkr.ecr.${{ env.AWS_REGION }}.amazonaws.com
          ECR_REPOSITORY: suspensionlab
        run: |
          docker build -t $ECR_REGISTRY/$ECR_REPOSITORY:frontend-${{ github.sha }} -f Dockerfile.frontend .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:frontend-${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set Kubernetes Context
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" | base64 --decode > ~/.kube/config

      - name: Setup Helm
        uses: azure/setup-helm@v3

      - name: Set Image Tag
        run: echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_ENV

      - name: Deploy with Helm
        run: |
          helm upgrade --install suspensionlab ./k8s/suspensionlab-chart \
            --set api.image.tag=${{ env.IMAGE_TAG }} \
            --set ui.image.tag=${{ env.IMAGE_TAG }} \
            --set workers.image.tag=${{ env.IMAGE_TAG }} \
            --values values-prod.yaml
